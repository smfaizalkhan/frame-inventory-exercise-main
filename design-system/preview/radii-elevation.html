<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../tokens.css"><link rel="stylesheet" href="../styles.css"><style>html,body{margin:0;background:white;font-family:var(--font-sans);color:var(--text-primary);}body{padding:18px;}</style></head><body>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">
<div><div style="font-size:11px;color:var(--text-secondary);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:14px;">Radii</div><div style="display:flex;gap:12px;align-items:flex-end;"><div style="text-align:center;"><div style="width:64px;height:40px;border-radius:4px;background:var(--blue-100);border:1px solid var(--blue-300);"></div><div style="font-size:10px;margin-top:6px;font-family:ui-monospace,monospace;color:var(--text-secondary);">--radius</div></div><div style="text-align:center;"><div style="width:64px;height:40px;border-radius:8px;background:var(--blue-100);border:1px solid var(--blue-300);"></div><div style="font-size:10px;margin-top:6px;font-family:ui-monospace,monospace;color:var(--text-secondary);">--radius-lg</div></div><div style="text-align:center;"><div style="width:64px;height:40px;border-radius:999px;background:var(--blue-100);border:1px solid var(--blue-300);"></div><div style="font-size:10px;margin-top:6px;font-family:ui-monospace,monospace;color:var(--text-secondary);">--radius-pill</div></div></div></div>
<div><div style="font-size:11px;color:var(--text-secondary);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:14px;">Elevation</div><div style="display:flex;gap:14px;"><div style="text-align:center;"><div style="width:64px;height:48px;background:white;border-radius:8px;box-shadow:var(--elev-low);"></div><div style="font-size:10px;margin-top:10px;font-family:ui-monospace,monospace;color:var(--text-secondary);">--elev-low</div></div><div style="text-align:center;"><div style="width:64px;height:48px;background:white;border-radius:8px;box-shadow:var(--elev-medium);"></div><div style="font-size:10px;margin-top:10px;font-family:ui-monospace,monospace;color:var(--text-secondary);">--elev-medium</div></div><div style="text-align:center;"><div style="width:64px;height:48px;background:white;border-radius:8px;box-shadow:var(--elev-high);"></div><div style="font-size:10px;margin-top:10px;font-family:ui-monospace,monospace;color:var(--text-secondary);">--elev-high</div></div></div></div>
</div>
</body></html>
